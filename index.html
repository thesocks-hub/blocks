<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blocks">
<meta name="theme-color" content="#0f0f0f">
<title>Blocks</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<!-- Firebase SDK -->
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBiKlp44CPkiaxT8_SaenY1cgz5gXr6p_c",
    authDomain: "blocks-4c0d8.firebaseapp.com",
    projectId: "blocks-4c0d8",
    storageBucket: "blocks-4c0d8.firebasestorage.app",
    messagingSenderId: "422245046917",
    appId: "1:422245046917:web:7e88b80d6a972a59eae7ec"
  };
  const FB_DEVICE_ID = 'blocks-main';

  window._fbSave = () => {};
  window._fbLoad = async () => null;
  window._startFbListen = () => {};
  window._fbSignIn  = async () => {};
  window._fbSignOut = async () => {};

  const loadScript = (src) => new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });

  window._fbReady = Promise.all([
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js'),
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js'),
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js'),
  ]).then(() => {
    firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    const ref  = db.collection('blocks_data').doc(FB_DEVICE_ID);

    window._fbSave = async (data) => {
      if (!auth.currentUser) return;
      try { await ref.set({ payload: JSON.stringify(data), updatedAt: Date.now() }); }
      catch(e) { console.warn('Firebase save error', e); }
    };
    window._fbLoad = async () => {
      if (!auth.currentUser) return null;
      try {
        const snap = await ref.get();
        if (snap.exists) return JSON.parse(snap.data().payload);
      } catch(e) { console.warn('Firebase load error', e); }
      return null;
    };
    window._startFbListen = () => {
      ref.onSnapshot(snap => {
        if (!snap.exists) return;
        try {
          const d = JSON.parse(snap.data().payload);
          if (window._S) {
            window._S.works  = d.works  || [];
            window._S.blocks = d.blocks || [];
            window._S.tasks  = d.tasks  || [];
            window._S.tags   = d.tags   || [];
            if (typeof renderAll === 'function') renderAll();
          }
        } catch(e) {}
      });
    };
    window._fbSignIn = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch(e) {
        if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
          // PWA/スマホではポップアップが使えないためリダイレクト方式へ
          // リダイレクト後はFirebaseが blocks-4c0d8.firebaseapp.com 経由で
          // 元のページ(https://thesocks-hub.github.io/blocks/)に戻す
          try { await auth.signInWithRedirect(provider); }
          catch(e2) { console.warn('Redirect sign-in error', e2); }
        } else if (e.code !== 'auth/popup-closed-by-user') {
          console.warn('Sign-in error', e.code, e);
        }
      }
    };
    window._fbSignOut = async () => {
      await auth.signOut();
    };

    // リダイレクト方式で戻ってきた場合の結果を処理
    auth.getRedirectResult().then(result => {
      if (result && result.user) {
        console.log('Redirect login success:', result.user.email);
      }
    }).catch(e => {
      if (e.code !== 'auth/no-current-user') console.warn('Redirect result error', e);
    });

    // 認証状態の変化を監視
    let _listenStarted = false;
    auth.onAuthStateChanged(user => {
      _updateAuthUI(user);
      if (user) {
        window._fbLoad().then(d => {
          if (d && window._S) {
            window._S.works  = d.works  || [];
            window._S.blocks = d.blocks || [];
            window._S.tasks  = d.tasks  || [];
            window._S.tags   = d.tags   || [];
            if (typeof renderAll === 'function') renderAll();
          }
          if (!_listenStarted) { _listenStarted = true; window._startFbListen(); }
        });
      }
    });
  }).catch(e => console.warn('Firebase load failed', e));

  // 認証UI更新（Firebase読み込み前後どちらでも呼べる）
  // ▼ 自分のGoogleアカウントのメールアドレスを入れると、そのアカウントのみ許可できる
  // 空配列 [] にすると誰でもログイン可能（現在の設定）
  const ALLOWED_EMAILS = [];

  function _updateAuthUI(user) {
    const btn  = document.getElementById('auth-btn');
    const info = document.getElementById('auth-info');
    if (!btn) return;
    btn.disabled = false;
    if (user) {
      // メールアドレス制限チェック
      if (ALLOWED_EMAILS.length > 0 && !ALLOWED_EMAILS.includes(user.email)) {
        info.textContent = '⚠️ アクセス権限がありません';
        info.style.color = 'var(--danger)';
        btn.textContent = 'ログアウト';
        btn.style.color = 'var(--danger)';
        btn.onclick = () => window._fbSignOut();
        window._fbSignOut(); // 自動的にサインアウト
        return;
      }
      info.style.color = 'var(--success)';
      info.textContent = '● ' + (user.displayName || user.email || 'ログイン中');
      btn.textContent = 'ログアウト';
      btn.style.color = 'var(--text2)';
      btn.onclick = () => window._fbSignOut();
    } else {
      info.style.color = 'var(--text3)';
      info.textContent = '未ログイン（同期停止中）';
      btn.textContent = 'Googleでログイン';
      btn.style.color = 'var(--text2)';
      btn.onclick = () => window._fbSignIn();
    }
  }
</script>

<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --accent: #c8b89a;
    --accent2: #8b7355;
    --danger: #c0614a;
    --success: #5a9e6e;
    --radius: 8px;
    --font: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; min-height: 100dvh; overscroll-behavior: none; }

  #app { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding-top: var(--safe-top);
  }
  #logo { padding: 20px 16px 16px; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); border-bottom: 1px solid var(--border); }
  #logo span { font-size: 10px; color: var(--text3); display: block; letter-spacing: 0.05em; margin-top: 2px; font-weight: 400; }
  .nav-item { padding: 10px 16px; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.15s; display: flex; align-items: center; gap: 8px; user-select: none; }
  .nav-item:hover { color: var(--text); background: var(--bg3); }
  .nav-item.active { color: var(--accent); background: var(--bg3); border-right: 2px solid var(--accent); }
  .nav-section { padding: 16px 16px 6px; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .work-item { padding: 8px 12px 8px 16px; font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.15s; display: flex; align-items: center; gap: 6px; border-left: 3px solid transparent; user-select: none; }
  .work-item:hover { color: var(--text); background: var(--bg3); }
  .work-item.active { color: var(--text); border-left-color: var(--accent); background: var(--bg3); }
  .work-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  #work-list-nav { flex: 1; overflow-y: auto; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); padding-bottom: calc(12px + var(--safe-bottom)); }
  .btn-add { width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .btn-add:hover, .btn-add:active { border-color: var(--accent2); color: var(--accent); }

  /* ===== MAIN ===== */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { padding: 14px 20px; padding-top: calc(14px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); }
  #topbar h2 { font-size: 15px; font-weight: 600; flex: 1; }
  .btn { padding: 6px 14px; border-radius: var(--radius); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: var(--font); border: 1px solid var(--border); background: var(--bg3); color: var(--text2); }
  .btn:hover, .btn:active { color: var(--text); border-color: var(--accent2); }
  .btn.primary { background: var(--accent2); color: var(--text); border-color: var(--accent2); }
  .btn.primary:hover, .btn.primary:active { background: var(--accent); }
  .btn.danger { color: var(--danger); }
  .btn-icon { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; font-size: 16px; line-height: 1; }

  #content-wrap { display: flex; flex: 1; overflow: hidden; }
  #content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(20px + var(--safe-bottom)); }

  /* ===== CALENDAR ===== */
  .cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cal-month { font-size: 20px; font-weight: 600; }
  .cal-nav { background: none; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: var(--radius); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cal-nav:hover { color: var(--text); border-color: var(--accent2); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 0; letter-spacing: 0.03em; }
  .cal-dow.work-day { color: var(--accent2); }
  .cal-cell { min-height: 88px; background: var(--bg2); border-radius: 6px; padding: 5px; position: relative; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; }
  .cal-cell:hover { background: var(--bg3); }
  .cal-cell.other-month { opacity: 0.25; pointer-events: none; }
  .cal-cell.today { border-color: var(--accent2); }
  .cal-cell.work-day-cell { background: #1e1c18; }
  .cal-date { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .cal-cell.today .cal-date { color: var(--accent); font-weight: 700; }
  .block-chip { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .block-chip.drawing { background: #1b3528; color: #6dbf8a; }
  .block-chip.name-d { background: #3a1e1e; color: #e07070; font-weight: 600; border: 1px solid #5a2a2a; }
  .block-chip.deadline-d { background: #3a2a1e; color: #d4915a; font-weight: 600; }
  .block-chip.task { background: #1e2a3a; color: #6a9abf; }
  .block-chip.done { opacity: 0.4; text-decoration: line-through; }

  /* ===== WORKS LIST ===== */
  .work-card { background: var(--bg2); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; cursor: pointer; border-left: 3px solid var(--border); transition: border-color 0.15s; }
  .work-card:hover { background: var(--bg3); }
  .work-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .work-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .badge.ok { background: #1b3528; color: #6dbf8a; }
  .badge.ng { background: #3a1e1e; color: #e07070; }
  .badge.pending { background: var(--bg3); color: var(--text3); }
  .badge.done { background: #1e2a3a; color: #7a9abf; }

  /* ===== WORK DETAIL ===== */
  .work-header-card { background: var(--bg2); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 14px; border-left: 4px solid var(--border); }
  .block-row { background: var(--bg2); border-radius: var(--radius); padding: 11px 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; transition: all 0.15s; }
  .block-row:hover { border-color: var(--border); }
  .block-row.done { opacity: 0.45; }
  .block-row.name-dl-row { background: #1e1414; border: 1px solid #3a2020; }
  .check-box { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .check-box.checked { background: var(--success); border-color: var(--success); }
  .block-info { flex: 1; min-width: 0; }
  .block-name { font-size: 13px; }
  .block-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .block-pages { font-size: 12px; color: var(--accent2); flex-shrink: 0; }
  .section-label { padding: 14px 0 6px; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .alert-box { background: #1e1414; border: 1px solid #3a2020; border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: #e07070; margin-bottom: 12px; line-height: 1.6; }
  .info-box { background: #141e18; border: 1px solid #203a28; border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: #7abf8a; margin-bottom: 12px; line-height: 1.6; }

  /* ===== BLOCKS TABLE ===== */
  .blocks-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .blocks-table thead th { font-size: 11px; color: var(--text3); font-weight: 400; padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; letter-spacing: 0.05em; }
  .blocks-table thead .chk-head { text-align: center; width: 36px; color: var(--accent2); font-weight: 600; }
  .blocks-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .blocks-table tbody tr:hover { background: var(--bg3); }
  .blocks-table tbody tr.row-done td { opacity: 0.4; }
  .blocks-table td { padding: 8px 10px; font-size: 13px; }
  .blocks-table .page-num { color: var(--accent2); font-weight: 500; width: 48px; white-space: nowrap; }
  .blocks-table .page-date { font-size: 12px; color: var(--text2); }
  .blocks-table .chk-cell { text-align: center; width: 36px; }
  /* ===== WORK TASK LIST ===== */
  .wl-row { display: flex; align-items: center; gap: 0; padding: 8px 10px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .wl-row:hover { background: var(--bg3); }
  .wl-row.row-done { opacity: 0.4; }
  .wl-header { display: flex; align-items: center; gap: 0; padding: 5px 10px; border-bottom: 1px solid var(--border); }
  .wl-col-name { flex: 1; min-width: 0; font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }
  .wl-col-date { width: 160px; flex-shrink: 0; font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }
  .wl-col-chk  { width: 36px; flex-shrink: 0; display: flex; justify-content: center; }
  .wl-name { flex: 1; min-width: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .wl-name:hover { color: var(--accent); }
  .wl-date { width: 160px; flex-shrink: 0; font-size: 12px; color: var(--text2); }
  .wl-chk  { width: 36px; flex-shrink: 0; display: flex; justify-content: center; }
  /* 作画スケジュール追加列 */
  .wl-col-dchk { width: 30px; flex-shrink: 0; font-size: 11px; color: var(--accent2); text-align: center; font-weight: 600; letter-spacing: 0.04em; }
  .wl-dchk     { width: 30px; flex-shrink: 0; display: flex; justify-content: center; }
  .wl-page     { width: 44px; flex-shrink: 0; font-size: 13px; color: var(--accent2); font-weight: 500; }
  .wl-page-hd  { width: 44px; flex-shrink: 0; font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }

  /* ===== MILESTONE ===== */
  .milestone-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .milestone-item { flex: 1; min-width: 160px; background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border); }
  .ms-label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 13px; flex-wrap: wrap; }
  .ms-label.ms-done { opacity: 0.5; }
  .ms-label.ms-done span { text-decoration: line-through; }
  .ms-deadline { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; }
  .ms-deadline-pending { color: #e07070; }
  .name-deadline-banner { background: #1e1414; border: 1px solid #3a2020; border-radius: var(--radius); padding: 8px 14px; font-size: 12px; color: #e07070; margin-bottom: 10px; }


  /* ===== MODAL ===== */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
  #modal h3 { font-size: 15px; margin-bottom: 18px; color: var(--accent); }
  .form-row { margin-bottom: 14px; }
  .form-row label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; letter-spacing: 0.04em; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 13px; font-family: var(--font); outline: none; -webkit-appearance: none; }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent2); }
  .form-row input[type="color"] { height: 38px; padding: 3px; cursor: pointer; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ===== SETTINGS ===== */
  .settings-section { background: var(--bg2); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; }
  .settings-section h3 { font-size: 13px; color: var(--accent2); margin-bottom: 12px; letter-spacing: 0.05em; }
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row .lbl { color: var(--text2); }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    #sidebar { display: none; }
    #sidebar.mobile-open { display: flex; position: fixed; inset: 0; z-index: 150; width: 260px; }
    #mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 140; }
    #mobile-overlay.open { display: block; }
    #topbar { padding-left: 12px; }
    #menu-btn { display: flex; }
    #content { padding: 8px; }
    /* モバイル: スクロールカレンダー */
    .cal-scroll-list { display: flex; flex-direction: column; gap: 2px; }
    .cal-scroll-day { display: flex; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .cal-scroll-day.today-row { background: #1e1c18; border-radius: 8px; border-bottom: none; margin-bottom: 2px; }
    .cal-scroll-dateblock { width: 40px; flex-shrink: 0; text-align: center; padding-top: 2px; }
    .cal-scroll-dow { font-size: 10px; color: var(--text3); }
    .cal-scroll-dow.work-dow { color: var(--accent2); }
    .cal-scroll-datenum { font-size: 22px; font-weight: 600; color: var(--text2); line-height: 1; }
    .cal-scroll-datenum.today-num { color: var(--accent); }
    .cal-scroll-chips { flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 28px; }
    .cal-scroll-empty { font-size: 11px; color: var(--text3); padding-top: 6px; }
    .cal-scroll-chip { font-size: 12px; padding: 5px 10px; border-radius: 6px; line-height: 1.3; cursor: grab; touch-action: none; }
    /* タスクカード */
    .task-card { padding: 10px 10px; }
    .task-name { font-size: 13px; }
    /* モーダル全画面 */
    #modal { max-height: 92vh; border-radius: 12px 12px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-width: 100%; margin: 0; }
    #modal-overlay { align-items: flex-end; padding: 0; }
    .modal-actions { padding-bottom: env(safe-area-inset-bottom); }
    /* blocks table スクロール */
    .blocks-table { font-size: 12px; }
    .blocks-table td { padding: 6px 6px; }
  }
  @media (min-width: 701px) {
    #menu-btn { display: none; }
    #mobile-overlay { display: none !important; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .block-chip.standalone-task:hover { background: #2a2a38; }

  /* ===== TASK LIST ===== */

  .tag-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; user-select: none; }

  .task-card:hover { border-color: var(--border); }

  .task-card .task-check { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; margin-top: 1px; }
  .task-card .task-check.checked { background: var(--success); border-color: var(--success); }
  .task-body { flex: 1; min-width: 0; }
  .task-title-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .task-name { font-size: 13px; font-weight: 500; }
  .task-datetime { font-size: 11px; color: var(--text3); }
  .task-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

  .task-memo { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.5; white-space: pre-wrap; }
  .task-edit-btn { color: var(--text3); font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; background: none; border: none; font-family: var(--font); transition: color 0.15s; }
  .task-edit-btn:hover { color: var(--accent); }
  .task-group-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 0 6px; }

  /* タグ管理モーダル */
  .tag-manager-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .tag-manager-row:last-child { border-bottom: none; }

  .empty-state { text-align: center; color: var(--text3); padding: 60px 20px; line-height: 2; }
  .empty-state p { font-size: 13px; }
</style>

<script>
'use strict';

// ===== CONSTANTS =====
const COLORS = ['#c8b89a','#7abf8a','#7a9abf','#bf7a9a','#bfaa7a','#9a7abf','#7abfbf','#bf9a7a','#bf7a7a','#aabf7a'];
const DAYS_JP = ['日','月','火','水','木','金','土'];
const DRAW_DAYS = [2,4,5]; // 火木金

// Default work-day page caps (火:2, 木:4, 金:4)
const DAY_CAPS = { 2: 2, 4: 4, 5: 4 };
const MINS_PER_PAGE = 90;

// ===== STATE =====
let S = {
  works: [],
  blocks: [],
  tasks: [],
  tags: [],
  view: 'calendar',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  selectedWork: null,
  calScrollInitialized: false,
  calFilterTags: [],
  worksCompletedOpen: false,
  dayCaps: { 2: 2, 4: 4, 5: 4 },
};

// ===== PERSIST =====
window._S = S; // Firebaseモジュールからアクセスできるよう公開

function save() {
  const data = { works: S.works, blocks: S.blocks, tasks: S.tasks, tags: S.tags, dayCaps: S.dayCaps };
  // localStorageに即時保存（オフライン対応）
  try { localStorage.setItem('blocks_v1', JSON.stringify(data)); } catch(e) {}
  // Firebaseにも非同期保存（設定済みの場合のみ）
  if (window._fbSave) window._fbSave(data);
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('blocks_v1') || 'null');
    if (d) { S.works = d.works || []; S.blocks = d.blocks || []; S.tasks = d.tasks || []; S.tags = d.tags || []; S.dayCaps = d.dayCaps || { 2: 2, 4: 4, 5: 4 }; }
  } catch(e) {}
  if (!S.works.length) seedData();
}

function seedData() {
  const fri = nextWeekday(new Date(), 5);
  const w1 = newWork('月刊サンプル 第12話', 10, dateStr(fri), COLORS[0]);
  const fri2 = addDays(fri, 14);
  const w2 = newWork('読切「春の終わり」', 8, dateStr(fri2), COLORS[1]);
  S.works.push(w1, w2);
  autoBlocks(w1); autoBlocks(w2);
  save();
}

// ===== HELPERS =====
function uid() { return Math.random().toString(36).slice(2, 9); }
function dateStr(d) { return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n) { return String(n).padStart(2, '0'); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function nextWeekday(from, dow) { const d = new Date(from); while(d.getDay()!==dow) d.setDate(d.getDate()+1); return d; }
function prevWeekday(from, dow) { const d = new Date(from); while(d.getDay()!==dow) d.setDate(d.getDate()-1); return d; }
function daysLeft(ds) { return Math.ceil((parseDate(ds) - new Date()) / 86400000); }

function newWork(title, pages, deadline, color, workType) {
  return { id: uid(), title, pages, deadline, color, workType: workType||'comic', memo: '', nameDeadline: null, nameDone: false, nyukoDone: false, workTasks: [] };
}

// ===== CORE LOGIC =====
function autoBlocks(work) {
  S.blocks = S.blocks.filter(b => !(b.workId === work.id && b.type === 'drawing'));
  const deadline = parseDate(work.deadline);
  // 締切から遡って稼働日ごとにcap分のスロットを収集
  const daySlots = [];
  const d = new Date(deadline);
  let watch = 90;
  while (watch-- > 0) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (!S.dayCaps[dow]) continue;
    daySlots.unshift({ date: dateStr(d), cap: S.dayCaps[dow] });
    const totalCap = daySlots.reduce((s, x) => s + x.cap, 0);
    if (totalCap >= work.pages) break;
  }
  // 各日のcap分だけページブロックを生成
  let pageNum = 1;
  for (const slot of daySlots) {
    for (let i = 0; i < slot.cap && pageNum <= work.pages; i++, pageNum++) {
      S.blocks.push({ id: uid(), workId: work.id, type: 'drawing', date: slot.date, pageNum, checks: { draft: false, inks: false, surface: false } });
    }
    if (pageNum > work.pages) break;
  }
  recalcName(work.id);
}

function recalcName(workId) {
  const work = S.works.find(w => w.id === workId);
  if (!work) return;
  const dbs = S.blocks.filter(b => b.workId === workId && b.type === 'drawing');
  if (!dbs.length) { work.nameDeadline = null; return; }
  const earliest = dbs.map(b => parseDate(b.date)).sort((a,b) => a-b)[0];
  // 作画開始が月曜 → 前週金曜、それ以外 → 前の月曜
  if (earliest.getDay() === 1) {
    work.nameDeadline = dateStr(prevWeekday(addDays(earliest, -1), 5));
  } else {
    work.nameDeadline = dateStr(prevWeekday(addDays(earliest, -1), 1));
  }
}

function blockDone(b) {
  return b.type === 'drawing'
    ? (b.checks && b.checks.draft && b.checks.inks && b.checks.surface)
    : !!b.done;
}

function getProgress(workId) {
  const work = S.works.find(w => w.id === workId);
  if (!work) return { pct: 0, status: 'pending', done: 0, total: 0 };
  if (work.nyukoDone) return { pct: 100, status: 'done', done: 0, total: 0 };
  const wtype = work?.workType || 'comic';
  const today = new Date(); today.setHours(0,0,0,0);

  if (wtype === 'comic') {
    const bs = S.blocks.filter(b => b.workId === workId && b.type === 'drawing');
    if (!bs.length) return { pct: 0, status: 'pending', done: 0, total: 0 };
    const done = bs.filter(b => blockDone(b)).length;
    const total = bs.length;
    const totalChecks = bs.reduce((s, b) => {
      const c = b.checks || {};
      return s + (c.draft?1:0) + (c.inks?1:0) + (c.surface?1:0);
    }, 0);
    const pct = Math.round(totalChecks / (total * 3) * 100);
    const shouldDone = bs.filter(b => parseDate(b.date) < today).length;
    const drawOk = done >= shouldDone;
    const nameOk = !work.nameDeadline || parseDate(work.nameDeadline) >= today || !!work.nameDone;
    return { pct, status: (drawOk && nameOk) ? 'ok' : 'ng', done, total };
  } else {
    // 非Comic: workTasksのチェック数で進捗
    const tasks = work?.workTasks || [];
    if (!tasks.length) return { pct: 0, status: 'pending', done: 0, total: 0 };
    const done = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const pct = Math.round(done / total * 100);
    const shouldDone = tasks.filter(t => t.date && parseDate(t.date) < today).length;
    const doneOnTime = tasks.filter(t => t.date && parseDate(t.date) < today && t.done).length;
    return { pct, status: doneOnTime >= shouldDone ? 'ok' : 'ng', done, total };
  }
}

// ===== ROUTING =====
function switchView(v, workId) {
  S.view = v;
  S.selectedWork = workId || null;
  ['calendar','works','work-detail','tasks','settings'].forEach(n => {
    document.getElementById(n+'-view').style.display = n === v ? '' : 'none';
  });
  ['cal','works','tasks','settings'].forEach(id => {
    document.getElementById('nav-'+id)?.classList.toggle('active',
      id === v || (id === 'works' && v === 'work-detail'));
  });
  document.querySelectorAll('.work-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === workId));
  renderAll();
}

// ===== RENDER =====
function renderAll() {
  renderSidebar();
  renderTopbar();
  if (S.view === 'calendar') renderCalendar();
  else if (S.view === 'works') renderWorks();
  else if (S.view === 'work-detail') renderDetail();
  else if (S.view === 'tasks') renderTasks();
  else if (S.view === 'settings') renderSettings();
}

function renderTopbar() {
  document.getElementById('topbar-title').textContent =
    S.view === 'calendar' ? 'カレンダー' :
    S.view === 'works' ? '作品一覧' :
    S.view === 'tasks' ? 'タスクリスト' :
    S.view === 'settings' ? '設定' :
    S.works.find(w => w.id === S.selectedWork)?.title || '';
  const act = document.getElementById('topbar-actions');
  if (S.view === 'works') {
    act.innerHTML = `<button class="btn primary" onclick="openNewWork()">＋ 作品追加</button>`;
  } else if (S.view === 'work-detail') {
    act.innerHTML = `<button class="btn" onclick="openEditWork('${S.selectedWork}')">編集</button>`;
  } else if (S.view === 'tasks') {
    act.innerHTML = `<button class="btn" onclick="openTagManager()">タグ管理</button><button class="btn primary" onclick="openNewTask()">＋ タスク追加</button>`;
  } else if (S.view === 'calendar') {
    const isMob = window.innerWidth <= 700;
    if (isMob && S.tags.length) {
      // スマホ: フィルターボタン1つ → タップでピッカーを開く
      const activeNames = S.calFilterTags.map(id => {
        const g = S.tags.find(g => g.id === id);
        return g ? (g.emoji || g.name.slice(0,4)) : '';
      }).filter(Boolean);
      const filterLabel = activeNames.length ? activeNames.join(' ') : '🏷️';
      const isActive = S.calFilterTags.length > 0;
      act.innerHTML = `<button class="btn" onclick="openCalFilterPicker()"
        style="font-size:13px;padding:4px 10px;${isActive?'background:var(--accent2)33;border-color:var(--accent2);color:var(--accent);':''}"
        title="タグフィルター">${filterLabel}</button>`
        + (isActive ? `<button class="btn" onclick="calSetFilter(null)" style="font-size:11px;color:var(--text3);margin-left:2px">✕</button>` : '')
        + `<button class="btn" onclick="calToday()" style="font-size:12px;margin-left:4px">今日</button>`;
    } else {
      const tagBtns = S.tags.map(g => {
        const active = S.calFilterTags.includes(g.id);
        const label = (g.emoji || '') + (g.emoji ? '' : g.name.slice(0,4));
        return `<button class="btn" onclick="calSetFilter('${g.id}')" title="${g.name}"
          style="font-size:12px;padding:4px 10px;margin-left:4px;${active?'background:'+g.color+'33;border-color:'+g.color+';color:'+g.color+';font-weight:600;':''}">${label}</button>`;
      }).join('');
      const clearBtn = S.calFilterTags.length ? `<button class="btn" onclick="calSetFilter(null)" style="font-size:11px;color:var(--text3);margin-left:4px">✕</button>` : '';
      act.innerHTML = tagBtns + clearBtn
        + `<button class="btn" onclick="calToday()" style="font-size:12px;margin-left:6px">今日</button>`
        + `<button class="btn" onclick="switchView('settings')" title="設定" style="margin-left:4px">⚙</button>`;
    }
  } else {
    act.innerHTML = '';
  }
}

function renderSidebar() {
  const activeWorks = S.works.filter(w => !w.nyukoDone);
  document.getElementById('work-list-nav').innerHTML = activeWorks.map(w =>
    `<div class="work-item ${S.selectedWork===w.id?'active':''}" data-id="${w.id}"
      onclick="switchView('work-detail','${w.id}');closeMobileMenu()">
      <div class="work-dot" style="background:${w.color}"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${w.title}</span>
    </div>`
  ).join('');
}

// ===== CALENDAR =====
// ドラッグ状態管理（マウス・タッチ共通）
let _drag = null; // { type:'block'|'task', id, el, ghost }
let _lastDropCell = null;

function _cellFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  // PCグリッド型 or スマホスクロール型 どちらにも対応
  return el?.closest('[data-date]') || null;
}

function _startDrag(type, id, srcEl, clientX, clientY) {
  _drag = { type, id };
  srcEl.style.opacity = '0.4';
  _drag.srcEl = srcEl;
  // ゴースト要素
  const ghost = srcEl.cloneNode(true);
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:999;opacity:0.85;
    width:${srcEl.offsetWidth}px;font-size:10px;border-radius:3px;padding:2px 5px;
    left:${clientX - srcEl.offsetWidth/2}px;top:${clientY - 12}px`;
  document.body.appendChild(ghost);
  _drag.ghost = ghost;
}

function _moveDrag(clientX, clientY) {
  if (!_drag) return;
  _drag.ghost.style.left = (clientX - _drag.ghost.offsetWidth/2) + 'px';
  _drag.ghost.style.top  = (clientY - 12) + 'px';
  const cell = _cellFromPoint(clientX, clientY);
  if (cell !== _lastDropCell) {
    _lastDropCell?.classList.remove('drag-over');
    cell?.classList.add('drag-over');
    _lastDropCell = cell;
  }
}

function _endDrag(clientX, clientY) {
  if (!_drag) return;
  _drag.ghost?.remove();
  _drag.srcEl.style.opacity = '';
  _lastDropCell?.classList.remove('drag-over');
  const cell = _cellFromPoint(clientX, clientY);
  const targetDate = cell?.dataset.date;
  if (targetDate) {
    if (_drag.type === 'block') {
      const b = S.blocks.find(b => b.id === _drag.id);
      if (b && b.date !== targetDate) { b.date = targetDate; recalcName(b.workId); save(); renderAll(); }
    } else if (_drag.type === 'task') {
      const t = S.tasks.find(t => t.id === _drag.id);
      if (t && t.date !== targetDate) { t.date = targetDate; save(); renderAll(); }
    } else if (_drag.type === 'subtask') {
      // ID形式: taskId::subId
      const [taskId, subId] = _drag.id.split('::');
      const t = S.tasks.find(t => t.id === taskId);
      const s = t?.subTasks?.find(s => s.id === subId);
      if (s && s.date !== targetDate) { s.date = targetDate; save(); renderAll(); }
    } else if (_drag.type === 'worktask') {
      // workId::taskId
      const [workId, taskId] = _drag.id.split('::');
      const w = S.works.find(w => w.id === workId);
      const t = w?.workTasks?.find(t => t.id === taskId);
      if (t && t.date !== targetDate) { t.date = targetDate; save(); renderAll(); }
    }
  }
  _drag = null; _lastDropCell = null;
}

function _attachDrag(el, type, id) {
  // マウス: クリック(移動なし)は編集、ドラッグ(移動あり)は移動
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    let moved = false;
    const startX = e.clientX, startY = e.clientY;
    const mm = e2 => {
      if (!moved && (Math.abs(e2.clientX-startX)>4 || Math.abs(e2.clientY-startY)>4)) {
        moved = true;
        _startDrag(type, id, el, e2.clientX, e2.clientY);
      }
      if (moved) _moveDrag(e2.clientX, e2.clientY);
    };
    const mu = e2 => {
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      if (moved) {
        _endDrag(e2.clientX, e2.clientY);
      } else {
        // クリック扱い: タスクなら編集
        if (type === 'task') openEditTask(id, e2);
      }
    };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
  // タッチ: ロングタップ(500ms)でD&D開始、短タップは編集
  let _touchTimer = null;
  let _touchDragging = false;
  let _touchStartX = 0, _touchStartY = 0;
  let _touchCancelled = false;
  el.addEventListener('touchstart', e => {
    _touchDragging = false;
    _touchCancelled = false;
    const t = e.touches[0];
    _touchStartX = t.clientX; _touchStartY = t.clientY;
    _touchTimer = setTimeout(() => {
      if (!_touchCancelled) {
        _touchDragging = true;
        _startDrag(type, id, el, _touchStartX, _touchStartY);
        // 振動フィードバック（対応端末のみ）
        if (navigator.vibrate) navigator.vibrate(40);
      }
    }, 500);
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - _touchStartX);
    const dy = Math.abs(t.clientY - _touchStartY);
    // 少し動いたらロングタップキャンセル（スクロール意図と判断）
    if (!_touchDragging && (dx > 8 || dy > 8)) {
      clearTimeout(_touchTimer);
      _touchCancelled = true;
    }
    if (_touchDragging) {
      e.preventDefault();
      _moveDrag(t.clientX, t.clientY);
    }
  }, { passive: false });
  el.addEventListener('touchend', e => {
    clearTimeout(_touchTimer);
    if (_touchDragging) {
      const t = e.changedTouches[0];
      _endDrag(t.clientX, t.clientY);
    } else if (!_touchCancelled) {
      // 短タップ: タスクなら編集
      if (type === 'task') openEditTask(id, e);
    }
    _touchDragging = false;
  });
  el.addEventListener('touchcancel', () => {
    clearTimeout(_touchTimer);
    if (_touchDragging) {
      _drag?.ghost?.remove();
      if (_drag?.srcEl) _drag.srcEl.style.opacity = '';
      _lastDropCell?.classList.remove('drag-over');
      _drag = null; _lastDropCell = null;
    }
    _touchDragging = false; _touchCancelled = true;
  });
}

function renderCalendar() {
  const el = document.getElementById('calendar-view');
  const isMobile = window.innerWidth <= 700;
  if (isMobile) { renderCalendarScroll(el); return; }

  const y = S.calYear, m = S.calMonth;
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  const today = new Date();

  const DAYS_MON = ['月','火','水','木','金','土','日'];
  const isWorkColMon = (col) => [1,3,4].includes(col);

  let html = `<div class="cal-header">
    <button class="cal-nav" onclick="calNav(-1)">◂</button>
    <span class="cal-month">${y}年${m+1}月</span>
    <button class="cal-nav" onclick="calNav(1)">▸</button>
  </div><div class="cal-grid" id="cal-grid">
    ${DAYS_MON.map((d,i) => `<div class="cal-dow ${isWorkColMon(i)?'work-day':''}">${d}</div>`).join('')}`;

  const startDowRaw = first.getDay();
  const startOffset = startDowRaw === 0 ? 6 : startDowRaw - 1;
  for (let i = 0; i < startOffset; i++) html += calCell(new Date(y, m, -startOffset+i+1), true, today);
  for (let d = 1; d <= last.getDate(); d++) html += calCell(new Date(y, m, d), false, today);
  const endDowRaw = last.getDay();
  const endOffset = endDowRaw === 0 ? 0 : 7 - endDowRaw;
  for (let i = 1; i <= endOffset; i++) html += calCell(new Date(y, m+1, i), true, today);

  el.innerHTML = html + '</div>';

  el.querySelectorAll('.chip-draggable').forEach(chip => {
    _attachDrag(chip, chip.dataset.dragType, chip.dataset.dragId);
  });
}

function renderCalendarScroll(el) {
  const y = S.calYear, m = S.calMonth;
  const last = new Date(y, m+1, 0);
  const today = new Date();
  const todayStr = dateStr(today);

  let html = `<div class="cal-header" style="margin-bottom:12px">
    <button class="cal-nav" onclick="calNav(-1)">◂</button>
    <span class="cal-month" style="font-size:17px">${y}年${m+1}月</span>
    <button class="cal-nav" onclick="calNav(1)">▸</button>
  </div><div class="cal-scroll-list" id="cal-scroll-list">`;

  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(y, m, d);
    const ds = dateStr(date);
    const dow = date.getDay();
    const dowLabel = DAYS_JP[dow];
    const isToday = ds === todayStr;
    const isWorkDay = DRAW_DAYS.includes(dow);

    let chips = '';

    // 締め切り・ネーム締め切り
    S.works.forEach(w => {
      if (w.nameDeadline === ds) chips += `<div class="cal-scroll-chip" style="background:#3a1e1e;color:#e07070;border-left:3px solid #e07070;${w.nameDone?'text-decoration:line-through;opacity:0.5':''}">✎ネーム〆 ${w.title.slice(0,12)}</div>`;
      if (w.deadline === ds) chips += `<div class="cal-scroll-chip" style="background:#3a2a1e;color:#d4915a;border-left:3px solid #d4915a">⚑〆 ${w.title.slice(0,12)}</div>`;
    });

    // ブロック
    S.blocks.filter(b => b.date === ds).forEach(b => {
      const w = S.works.find(w => w.id === b.workId);
      if (!w) return;
      const isDone = blockDone(b);
      const lbl = b.type === 'drawing' ? `${b.pageNum}p ${w.title.slice(0,8)}` : (b.title||'タスク').slice(0,15);
      chips += `<div class="cal-scroll-chip chip-draggable ${isDone?'done':''}"
        data-drag-type="block" data-drag-id="${b.id}"
        style="background:${w.color}22;color:${w.color};border-left:3px solid ${w.color};${isDone?'opacity:0.4;text-decoration:line-through':''}">${lbl}</div>`;
    });

    // スタンドアロンタスク（絵文字・フィルター）
    S.tasks.filter(t => {
      if (!t.date || t.date !== ds) return false;
      if (S.calFilterTags.length && !S.calFilterTags.some(id => (t.tagIds||[]).includes(id))) return false;
      return true;
    }).forEach(t => {
      const tags = (t.tagIds||[]).map(id => S.tags.find(g=>g.id===id)).filter(Boolean);
      const c = tags.length ? tags[0].color : '#888';
      const emoji = tags.length && tags[0].emoji ? tags[0].emoji + ' ' : '';
      chips += `<div class="cal-scroll-chip chip-draggable ${t.done?'done':''}"
        data-drag-type="task" data-drag-id="${t.id}"
        style="background:${c}22;color:${c};border-left:3px solid ${c};${t.done?'opacity:0.4;text-decoration:line-through':''}"
        >${emoji}${(t.title||'タスク').slice(0,18)}</div>`;
    });

    // サブタスク（親タスク名付き・親タグでフィルター）
    S.tasks.forEach(t => {
      if (S.calFilterTags.length && !S.calFilterTags.some(id => (t.tagIds||[]).includes(id))) return;
      (t.subTasks||[]).forEach(s => {
        if (s.date !== ds) return;
        const tagColors = (t.tagIds||[]).map(id => S.tags.find(g=>g.id===id)?.color).filter(Boolean);
        const c = tagColors.length ? tagColors[0] : '#666';
        const lbl = '↳ ' + (t.title||'').slice(0,8) + ' ' + (s.title||'').slice(0,10);
        chips += `<div class="cal-scroll-chip chip-draggable ${s.done?'done':''}"
          data-drag-type="subtask" data-drag-id="${t.id}::${s.id}"
          style="background:${c}11;color:${c}cc;border-left:3px solid ${c}66;${s.done?'opacity:0.4;text-decoration:line-through':''}"
          onclick="openEditTask('${t.id}',event)">${lbl}</div>`;
      });
    });
    // workTasks（作品タスク）
    S.works.forEach(w => {
      (w.workTasks||[]).forEach(t => {
        if (!t.date || t.date !== ds) return;
        chips += `<div class="cal-scroll-chip chip-draggable ${t.done?'done':''}"
          data-drag-type="worktask" data-drag-id="${w.id}::${t.id}"
          style="background:${w.color}11;color:${w.color}cc;border-left:3px solid ${w.color}66;${t.done?'opacity:0.4;text-decoration:line-through':''};cursor:grab;touch-action:none"
          onclick="openEditWorkTask('${w.id}','${t.id}')">${w.title.slice(0,6)} ${(t.title||'').slice(0,10)}</div>`;
      });
    });

    if (!chips) chips = `<div class="cal-scroll-empty" onclick="openNewTaskOnDate('${ds}')" style="cursor:pointer">＋</div>`;

    html += `<div class="cal-scroll-day${isToday?' today-row':''}" data-date="${ds}">
      <div class="cal-scroll-dateblock" onclick="openNewTaskOnDate('${ds}')" style="cursor:pointer">
        <div class="cal-scroll-dow${isWorkDay?' work-dow':''}">${dowLabel}</div>
        <div class="cal-scroll-datenum${isToday?' today-num':''}">${d}</div>
      </div>
      <div class="cal-scroll-chips">${chips}</div>
    </div>`;
  }

  html += '</div>';
  el.innerHTML = html;

  // 今日にスクロール（初回のみ）
  if (!S.calScrollInitialized) {
    S.calScrollInitialized = true;
    setTimeout(() => {
      const todayEl = el.querySelector('.today-row');
      if (todayEl) todayEl.scrollIntoView({ behavior: 'auto', block: 'start' });
    }, 50);
  }

  // ドラッグ登録
  el.querySelectorAll('.chip-draggable').forEach(chip => {
    _attachDrag(chip, chip.dataset.dragType, chip.dataset.dragId);
  });
}

function calCell(date, other, today) {
  const ds = dateStr(date);
  const dow = date.getDay();
  let cls = 'cal-cell';
  if (other) return `<div class="${cls} other-month"><div class="cal-date">${date.getDate()}</div></div>`;
  if (sameDay(date, today)) cls += ' today';
  if (DRAW_DAYS.includes(dow)) cls += ' work-day-cell';

  let chips = '';
  S.works.forEach(w => {
    if (w.nameDeadline === ds) chips += `<div class="block-chip name-d" style="${w.nameDone?'text-decoration:line-through;opacity:0.5':''}">✎ネーム〆 ${w.title.slice(0,7)}</div>`;
    if (w.deadline === ds) chips += `<div class="block-chip deadline-d" style="border-left:2px solid ${w.color}">⚑〆 ${w.title.slice(0,7)}</div>`;
  });
  S.blocks.filter(b => b.date === ds).forEach(b => {
    const w = S.works.find(w => w.id === b.workId);
    if (!w) return;
    const isDone = blockDone(b);
    const lbl = b.type==='drawing' ? `${b.pageNum}p ${w.title.slice(0,5)}` : (b.title||'タスク').slice(0,10);
    chips += `<div class="block-chip chip-draggable ${b.type==='drawing'?'drawing':'task'} ${isDone?'done':''}"
      data-drag-type="block" data-drag-id="${b.id}"
      style="border-left:2px solid ${w.color};cursor:grab;touch-action:none">${lbl}</div>`;
  });
  // スタンドアロンタスク（日付あり・カレンダーフィルター適用）
  S.tasks.filter(t => {
    if (!t.date || t.date !== ds) return false;
    if (S.calFilterTags.length && !S.calFilterTags.some(id => (t.tagIds||[]).includes(id))) return false;
    return true;
  }).forEach(t => {
    const tags = (t.tagIds||[]).map(id => S.tags.find(g=>g.id===id)).filter(Boolean);
    const chipColor = tags.length ? tags[0].color : '#666';
    const chipBg    = tags.length ? tags[0].color + '22' : '#66666622';
    const emoji     = tags.length && tags[0].emoji ? tags[0].emoji + ' ' : '';
    chips += `<div class="block-chip chip-draggable standalone-task ${t.done?'done':''}"
      data-drag-type="task" data-drag-id="${t.id}"
      style="border-left:2px solid ${chipColor};background:${chipBg};color:${tags.length?chipColor:'#aaa'};cursor:grab;touch-action:none"
      >${emoji}${(t.title||'タスク').slice(0,12)}</div>`;
  });

  // 日付ありサブタスクもカレンダーに表示（親タスク名付き・親タグでフィルター）
  S.tasks.forEach(t => {
    if (S.calFilterTags.length && !S.calFilterTags.some(id => (t.tagIds||[]).includes(id))) return;
    (t.subTasks||[]).forEach(s => {
      if (s.date !== ds) return;
      const tagColors = (t.tagIds||[]).map(id => S.tags.find(g=>g.id===id)?.color).filter(Boolean);
      const chipColor = tagColors.length ? tagColors[0] : '#666';
      const lbl = ('↳ ' + (t.title||'').slice(0,6) + ' ' + (s.title||'').slice(0,8)).slice(0,16);
      chips += `<div class="block-chip chip-draggable standalone-task ${s.done?'done':''}"
        data-drag-type="subtask" data-drag-id="${t.id}::${s.id}"
        style="border-left:2px solid ${chipColor}88;background:${chipColor}11;color:${tagColors.length?chipColor+'cc':'#888'};cursor:grab;touch-action:none"
        onclick="openEditTask('${t.id}',event)">${lbl}</div>`;
    });
  });

  // workTasks（作品タスク）をカレンダーに表示
  S.works.forEach(w => {
    (w.workTasks||[]).forEach(t => {
      if (!t.date || t.date !== ds) return;
      chips += `<div class="block-chip chip-draggable ${t.done?'done':''}"
        data-drag-type="worktask" data-drag-id="${w.id}::${t.id}"
        style="border-left:2px solid ${w.color}88;background:${w.color}11;color:${w.color}cc;cursor:grab;touch-action:none"
        onclick="openEditWorkTask('${w.id}','${t.id}')">${w.title.slice(0,5)} ${(t.title||'').slice(0,8)}</div>`;
    });
  });

  return `<div class="${cls}" data-date="${ds}"><div class="cal-date" onclick="openNewTaskOnDate('${ds}')" style="cursor:pointer;padding:1px 3px;border-radius:3px" title="タスクを追加">${date.getDate()}</div>${chips}</div>`;
}

function calNav(d) {
  S.calMonth += d;
  if (S.calMonth > 11) { S.calMonth = 0; S.calYear++; }
  if (S.calMonth < 0) { S.calMonth = 11; S.calYear--; }
  S.calScrollInitialized = false; // 月移動時は先頭にスクロール
  renderCalendar();
}
function calSetFilter(tagId) {
  if (!tagId) {
    S.calFilterTags = [];
  } else {
    const idx = S.calFilterTags.indexOf(tagId);
    if (idx >= 0) S.calFilterTags.splice(idx, 1);
    else S.calFilterTags.push(tagId);
  }
  renderAll();
}

function calFilterFromSelect(sel) {
  S.calFilterTags = Array.from(sel.selectedOptions)
    .map(o => o.value).filter(v => v !== '');
  renderAll();
}

function openCalFilterPicker() {
  const body = S.tags.map(g => {
    const checked = S.calFilterTags.includes(g.id);
    const lbl = (g.emoji ? g.emoji + ' ' : '') + g.name;
    return `<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:15px;user-select:none">
      <input type="checkbox" data-filter-tag="${g.id}" ${checked?'checked':''}
        style="width:18px;height:18px;accent-color:${g.color};cursor:pointer;flex-shrink:0">
      <span style="flex:1;${checked?'color:'+g.color+';font-weight:600':''}">${lbl}</span>
    </label>`;
  }).join('');
  openModal('タグフィルター', body, '適用', () => {
    S.calFilterTags = [...document.querySelectorAll('[data-filter-tag]:checked')]
      .map(el => el.dataset.filterTag);
    closeModal(); renderAll();
  });
}

function calToday() {
  const t = new Date(); S.calYear = t.getFullYear(); S.calMonth = t.getMonth();

      ${prog.status !== 'done' ? `<span style="font-size:11px;color:var(--text3)">${prog.done}/${prog.total}完了 (${prog.pct}%)</span>` : ''}
    </div>
  </div>`;

  // マイルストーン（Comicのみネーム完了を表示）
  html += '<div class="section-label">マイルストーン</div>';
  html += '<div class="milestone-row">';
  if (isComic) {
    html += `<div class="milestone-item">
      <label class="ms-label ${work.nameDone?'ms-done':''}">
        <input type="checkbox" ${work.nameDone?'checked':''} onchange="toggleWorkFlag('${work.id}','nameDone',this.checked)"
          style="width:15px;height:15px;accent-color:var(--accent2);cursor:pointer">
        <span>ネーム完了</span>
        ${!work.nyukoDone && work.nameDeadline ? `<span class="ms-deadline ${work.nameDone?'':'ms-deadline-pending'}">〆 ${work.nameDeadline}（${DAYS_JP[parseDate(work.nameDeadline).getDay()]}）</span>` : ''}
      </label>
    </div>`;
  }
  html += `<div class="milestone-item">
    <label class="ms-label ${work.nyukoDone?'ms-done':''}">
      <input type="checkbox" ${work.nyukoDone?'checked':''} onchange="toggleWorkFlag('${work.id}','nyukoDone',this.checked)"
        style="width:15px;height:15px;accent-color:var(--accent2);cursor:pointer">
      <span>入稿完了</span>
      <span class="ms-deadline">〆 ${work.deadline}（${DAYS_JP[parseDate(work.deadline).getDay()]}）</span>
    </label>
  </div></div>`;

  // 作品タスク＋作画スケジュールを1つの統合グリッドで表示
  const workTasks = (work.workTasks||[]).slice().sort((a,b) => {
    if (!a.date && !b.date) return 0;

    if (!b.date) return -1;

  const chkSvg = '<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2"/></svg>';

  // 統合グリッド: display:grid で列幅を確実に揃える
  // 列: [識別 80px] [日付 auto] [D 32px] [I 32px] [S 32px] (作画スケジュール)
  //     [識別 80px] [日付 auto] [✓ 32px] (作画準備 - D/I/Sはなし)
  // → 全行共通: grid-template-columns: 80px 1fr 32px 32px 32px
  const gridCols = '80px 1fr 40px 32px 32px 32px'; // タスク名・日付・削除・D・I・S
  const G = (style, content) => '<div style="' + style + '">' + content + '</div>';

  // 作画準備セクション
  html += '<div class="section-label" style="display:flex;align-items:center;justify-content:space-between">'
    + '<span>' + wtLabel + '</span>'
    + '<button class="btn" style="padding:2px 10px;font-size:11px" onclick="openAddWorkTask(\'' + work.id + '\')">＋ 追加</button>'
    + '</div>';

  if (workTasks.length === 0) {
    html += '<div style="font-size:12px;color:var(--text3);padding:6px 0 10px">タスクがありません</div>';
  } else {
    // ヘッダー行
    html += '<div style="display:grid;grid-template-columns:' + gridCols + ';padding:5px 10px;border-bottom:1px solid var(--border)">'
      + G('font-size:11px;color:var(--text3)', 'タスク')
      + G('font-size:11px;color:var(--text3)', '日付')
      + G('', '')
      + G('font-size:11px;color:var(--accent2);font-weight:600;text-align:center;grid-column:4/7', '✓')
      + '</div>';
    workTasks.forEach(function(t) {
      const dow = t.date ? '（' + DAYS_JP[parseDate(t.date).getDay()] + '）' : '';
      const chkd = t.done ? 'checked' : '';
      html += '<div style="display:grid;grid-template-columns:' + gridCols + ';align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);' + (t.done?'opacity:0.4':'') + '">'
        + G('overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-size:13px' + (t.done?';text-decoration:line-through':''), '<span onclick="openEditWorkTask(\'' + work.id + '\',\'' + t.id + '\')" style="color:var(--text)" title="クリックで編集">' + (t.title||'タスク') + '</span>')
        + G('font-size:12px;color:var(--text2)', t.date ? t.date + dow : '—')
        + G('display:flex;justify-content:center;align-items:center', '<button onclick="deleteWorkTask(\'' + work.id + '\',\'' + t.id + '\')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 4px" title="削除">×</button>')
        + G('display:flex;justify-content:center;align-items:center;grid-column:4/7', '<input type="checkbox" ' + chkd + ' onchange="toggleWorkTaskById(\'' + work.id + '\',\'' + t.id + '\',this.checked)" style="width:15px;height:15px;accent-color:var(--accent2);cursor:pointer">')
        + '</div>';
    });
  }

  // 作画スケジュール（Comicのみ）
  if (isComic && drawBlocks.length > 0) {
    html += '<div class="section-label">作画スケジュール</div>';
    // ヘッダー行（同じgridCols）
    html += '<div style="display:grid;grid-template-columns:' + gridCols + ';padding:5px 10px;border-bottom:1px solid var(--border)">'
      + G('font-size:11px;color:var(--text3)', 'Page')
      + G('font-size:11px;color:var(--text3)', '日付')
      + G('font-size:11px;color:var(--accent2);font-weight:600;text-align:center', 'D')
      + G('font-size:11px;color:var(--accent2);font-weight:600;text-align:center', 'I')
      + G('font-size:11px;color:var(--accent2);font-weight:600;text-align:center', 'S')
      + '</div>';
    drawBlocks.forEach(b => {
      const dow = DAYS_JP[parseDate(b.date).getDay()];
      const c = b.checks || {};
      const isDone = blockDone(b);
      const dchk = (key) => G('display:flex;justify-content:center;align-items:center', '<input type="checkbox" ' + (c[key]?'checked':'') + ' onchange="toggleCheck(\'' + b.id + '\',\'' + key + '\',this.checked)" style="width:15px;height:15px;accent-color:var(--accent2);cursor:pointer">');
      html += '<div style="display:grid;grid-template-columns:' + gridCols + ';align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);' + (isDone?'opacity:0.4':'') + '">'
        + G('font-size:13px;color:var(--accent2);font-weight:500', b.pageNum + 'p')
        + G('font-size:12px;color:var(--text2)', b.date + '（' + dow + '）')
        + dchk('draft') + dchk('inks') + dchk('surface')
        + '</div>';
    });
  }

  // 旧タスクブロック（互換性のため残す）
  const taskBlocks = S.blocks.filter(b => b.workId===work.id && b.type!=='drawing').sort((a,b)=>a.date.localeCompare(b.date));
  if (taskBlocks.length) {
    html += '<div class="section-label">その他タスク</div>';
    taskBlocks.forEach(b => {
      const dow = DAYS_JP[parseDate(b.date).getDay()];
      html += `<div class="block-row ${b.done?'done':''}">
        <div class="check-box ${b.done?'checked':''}" onclick="toggleDone('${b.id}')">
          ${b.done ? chkSvg : ''}
        </div>
        <div class="block-info">
          <div class="block-name">${b.title||'タスク'}</div>
          <div class="block-date">${b.date}（${dow}）</div>
        </div>
        <button class="btn danger" style="padding:3px 8px;font-size:11px;flex-shrink:0" onclick="deleteBlock('${b.id}',event)">削除</button>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function openAddWorkTask(workId) {
  openModal('タスクを追加', `
    <div class="form-row"><label>タスク名</label><input id="f-wt-title" placeholder="例: ネーム第1稿、下描き確認" autofocus /></div>
    <div class="form-row"><label>日付（任意）</label><input id="f-wt-date" type="date" /></div>
  `, '追加', () => {
    const title = document.getElementById('f-wt-title').value.trim();
    if (!title) return;
    const w = S.works.find(w => w.id === workId);
    if (!w) return;
    if (!w.workTasks) w.workTasks = [];
    w.workTasks.push({ id: uid(), title, date: document.getElementById('f-wt-date').value || null, done: false });
    save(); closeModal(); renderAll();
  });
}

function openEditWorkTask(workId, taskId) {
  const w = S.works.find(w => w.id === workId);
  if (!w || !w.workTasks) return;
  const t = w.workTasks.find(t => t.id === taskId);
  if (!t) return;
  openModal('タスクを編集', `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <input type="checkbox" id="f-wt-done" ${t.done?'checked':''} style="width:16px;height:16px;accent-color:var(--success);cursor:pointer">
      <label for="f-wt-done" style="font-size:13px;cursor:pointer;color:var(--text2)">完了</label>
    </div>
    <div class="form-row"><label>タスク名</label><input id="f-wt-title" value="${t.title||''}" /></div>
    <div class="form-row"><label>日付（任意）</label><input id="f-wt-date" type="date" value="${t.date||''}" /></div>
  `, '保存', () => {
    t.done = document.getElementById('f-wt-done').checked;
    t.title = document.getElementById('f-wt-title').value.trim();
    t.date = document.getElementById('f-wt-date').value || null;
    save(); closeModal(); renderAll();
  });
}

function deleteWorkTask(workId, taskId) {
  const w = S.works.find(w => w.id === workId);
  if (!w || !w.workTasks) return;
  w.workTasks = w.workTasks.filter(t => t.id !== taskId);
  save(); renderAll();
}

function toggleWorkTask(workId, idx) {
  const w = S.works.find(w => w.id === workId);
  if (!w || !w.workTasks) return;
  w.workTasks[idx].done = !w.workTasks[idx].done;
  save(); renderAll();
}

function toggleWorkTaskById(workId, taskId, checked) {
  const w = S.works.find(w => w.id === workId);
  if (!w || !w.workTasks) return;
  const t = w.workTasks.find(t => t.id === taskId);
  if (t) { t.done = checked; save(); renderAll(); }
}

// ===== TASK LIST =====
let taskFilterTag = null;   // null=全件
let taskFilterDone = null;  // null=全件, true=完了, false=未完了

function renderTasks() {
  const el = document.getElementById('tasks-view');
  const today = new Date(); today.setHours(0,0,0,0);

  // フィルター行（タグ＋完了フィルター）
  const fAll  = !taskFilterTag && taskFilterDone === null;
  const fTodo = taskFilterDone === false;
  const fDone = taskFilterDone === true;
  let html = '<div class="task-filters">'
    + `<span class="tag-pill${fAll?' active':''}" style="color:var(--text2);${fAll?'background:var(--bg3);border-color:var(--text2);':'border-color:var(--border)'}" onclick="taskFilterTag=null;taskFilterDone=null;renderTasks()">すべて</span>`
    + `<span class="tag-pill${fTodo?' active':''}" style="color:var(--accent2);${fTodo?'background:var(--accent2)22;border-color:var(--accent2);font-weight:600;':'border-color:transparent'}" onclick="taskFilterDone=taskFilterDone===false?null:false;renderTasks()">未完了</span>`
    + `<span class="tag-pill${fDone?' active':''}" style="color:var(--success);${fDone?'background:var(--success)22;border-color:var(--success);font-weight:600;':'border-color:transparent'}" onclick="taskFilterDone=taskFilterDone===true?null:true;renderTasks()">完了済</span>`;
  if (S.tags.length) html += '<span style="color:var(--border);padding:0 4px">|</span>';
  S.tags.forEach(g => {
    const active = taskFilterTag === g.id;
    html += `<span class="tag-pill ${active?'active':''}" style="color:${g.color};background:${g.color}18" onclick="taskFilterTag=taskFilterTag==='${g.id}'?null:'${g.id}';renderTasks()">${g.emoji?g.emoji+' ':''}${g.name}</span>`;
  });
  html += `<span class="tag-pill" style="color:var(--text3)" onclick="openTagManager()">＋ タグ</span></div>`;

  // タスクを絞り込み
  let tasks = S.tasks.filter(t => {
    if (taskFilterTag && !(t.tagIds||[]).includes(taskFilterTag)) return false;
    if (taskFilterDone === true && !t.done) return false;
    if (taskFilterDone === false && t.done) return false;
    return true;
  });

  if (!tasks.length) {
    html += '<div class="empty-state"><p>タスクがありません</p></div>';
    el.innerHTML = html;
    return;
  }

  // 日付なし / 過去・今日 / 未来 でグルーピング
  const noDate = tasks.filter(t => !t.date);
  const dated  = tasks.filter(t => !!t.date).sort((a,b) => a.date.localeCompare(b.date));
  const past   = dated.filter(t => parseDate(t.date) <= today);
  const future = dated.filter(t => parseDate(t.date) > today);

  const renderGroup = (label, list) => {
    if (!list.length) return '';
    let g = '<div class="task-group-label">' + label + '</div>';
    list.forEach(t => { g += renderTaskCard(t); });
    return g;
  };

  html += renderGroup('日付なし', noDate);
  html += renderGroup('今日・過去', past);
  html += renderGroup('予定', future);

  el.innerHTML = html;
}

function renderTaskCard(t) {
  const tagHtml = (t.tagIds||[]).map(id => {
    const g = S.tags.find(g => g.id === id);
    return g ? `<span class="task-tag" style="background:${g.color}22;color:${g.color}">${g.emoji?g.emoji+' ':''}${g.name}</span>` : '';
  }).join('');
  const dateStr2 = t.date ? `${t.date}${t.time ? ' ' + t.time : ''}` : '';
  const chkSvg = `<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2"/></svg>`;
  // サブタスク
  const subs = (t.subTasks||[]).slice().sort((a,b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });
  const subDone = subs.filter(s=>s.done).length;
  const subHtml = subs.length ? `
    <div style="margin-top:6px;padding-left:2px">
      ${subs.map((s,i) => `<div style="display:flex;align-items:center;gap:5px;padding:3px 0">
        <div style="width:13px;height:13px;border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:${s.done?'var(--success)':'transparent'};border-color:${s.done?'var(--success)':'var(--border)'}"
          onclick="toggleSubTaskFromListById('${t.id}','${s.id}')">
          ${s.done?`<svg width="8" height="8" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2"/></svg>`:''}
        </div>
        <span style="font-size:11px;${s.done?'opacity:0.4;text-decoration:line-through':''}">${s.title}</span>
        ${s.date?`<span style="font-size:10px;color:var(--text3);margin-left:auto">${s.date}</span>`:''}
      </div>`).join('')}
      <div style="font-size:10px;color:var(--text3);margin-top:3px">${subDone}/${subs.length} 完了</div>
    </div>` : '';
  return `<div class="task-card ${t.done?'done-card':''}">
    <div class="task-check ${t.done?'checked':''}" onclick="toggleTaskDone('${t.id}')">${t.done?chkSvg:''}</div>
    <div class="task-body">
      <div class="task-title-row">
        <span class="task-name">${t.title||'（無題）'}</span>
        ${dateStr2 ? `<span class="task-datetime">${dateStr2}</span>` : ''}
      </div>
      ${tagHtml ? `<div class="task-tags">${tagHtml}</div>` : ''}
      ${t.memo ? `<div class="task-memo">${t.memo}</div>` : ''}
      ${subHtml}
    </div>
    <button class="task-edit-btn" onclick="openEditTask('${t.id}',event)">編集</button>
  </div>`;
}

function toggleSubTaskFromListById(taskId, subId) {
  const s = _findSubTask(taskId, subId);
  if (!s) return;
  s.done = !s.done;
  save(); renderAll();
}

function toggleTaskDone(taskId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.done = !t.done;
  save(); renderAll();
}
