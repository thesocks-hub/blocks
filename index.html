// ===== ACTIONS =====
function toggleDone(id) {
  const b = S.blocks.find(b => b.id === id);
  if (b) { b.done = !b.done; save(); renderAll(); }
}

function toggleWorkFlag(workId, key, val) {
  const w = S.works.find(w => w.id === workId);
  if (!w) return;
  w[key] = val;
  save(); renderAll();
}

function updateDayCap(dow, val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 0) { S.dayCaps[dow] = n; save(); }
}

function toggleCheck(blockId, key, val) {
  const b = S.blocks.find(b => b.id === blockId);
  if (!b) return;
  if (!b.checks) b.checks = { draft: false, inks: false, surface: false };
  b.checks[key] = val;
  save();
  // 右パネルを再描画（チェック状態バッジを更新）
  renderAll();
  renderAll();
}

function deleteBlock(id, e) {
  e?.stopPropagation();
  S.blocks = S.blocks.filter(b => b.id !== id);
  save(); renderAll();
}



// ===== MODALS =====
let _modalCb = null;

function openModal(title, body, okLabel, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-ok').textContent = okLabel;
  document.getElementById('modal-ok').onclick = cb;
  _modalCb = cb;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function openNewWork() {
  const defColor = COLORS[S.works.length % COLORS.length];
  const defDeadline = dateStr(nextWeekday(new Date(), 5));
  const typeOpts = ['comic','project','illust','3d'].map(t =>
    `<option value="${t}">${{comic:'Comic',project:'Project',illust:'Illust','3d':'3D'}[t]}</option>`).join('');
  openModal('新しい作品',
    `<div class="form-row"><label>タイプ</label>
       <select id="f-type" onchange="document.getElementById('f-pages-row').style.display=this.value==='comic'?'':'none'">${typeOpts}</select></div>
     <div class="form-row"><label>タイトル</label><input id="f-title" placeholder="例: 月刊○○ 第13話" autofocus /></div>
     <div class="form-row" id="f-pages-row"><label>ページ数</label><input id="f-pages" type="number" value="8" min="1" max="200" /></div>
     <div class="form-row"><label>締切日</label><input id="f-deadline" type="date" value="${defDeadline}" /></div>
     <div class="form-row"><label>カラー</label><input id="f-color" type="color" value="${defColor}" /></div>`,
    '作成', () => {
      const title = document.getElementById('f-title').value.trim();
      const wtype = document.getElementById('f-type').value;
      const pages = wtype === 'comic' ? (parseInt(document.getElementById('f-pages').value) || 0) : 0;
      const deadline = document.getElementById('f-deadline').value;
      const color = document.getElementById('f-color').value;
      if (!title || !deadline) { alert('タイトルと締切日を入力してください'); return; }
      if (wtype === 'comic' && !pages) { alert('ページ数を入力してください'); return; }
      const w = newWork(title, pages, deadline, color, wtype);
      S.works.push(w);
      if (wtype === 'comic') autoBlocks(w);
      save(); closeModal(); switchView('work-detail', w.id);
    });
}

function openEditWork(workId) {
  const w = S.works.find(w => w.id === workId);
  if (!w) return;
  const wtype = w.workType || 'comic';
  const typeOpts = ['comic','project','illust','3d'].map(t =>
    `<option value="${t}" ${t===wtype?'selected':''}>${{comic:'Comic',project:'Project',illust:'Illust','3d':'3D'}[t]}</option>`).join('');
  const isComic = wtype === 'comic';
  openModal('作品を編集',
    `<div class="form-row"><label>タイプ</label>
       <select id="f-type" onchange="document.getElementById('f-pages-row').style.display=this.value==='comic'?'':'none'">${typeOpts}</select></div>
     <div class="form-row"><label>タイトル</label><input id="f-title" value="${w.title}" /></div>
     <div class="form-row" id="f-pages-row" style="display:${isComic?'':'none'}"><label>ページ数</label><input id="f-pages" type="number" value="${w.pages||8}" min="1" /></div>
     <div class="form-row"><label>締切日</label><input id="f-deadline" type="date" value="${w.deadline}" /></div>
     <div class="form-row"><label>カラー</label><input id="f-color" type="color" value="${w.color}" /></div>
     <div class="form-row"><label>メモ</label><textarea id="f-memo" rows="4" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:13px;font-family:var(--font);resize:vertical;outline:none">${w.memo||''}</textarea></div>
     ${isComic?'<div class="info-box" style="margin-top:4px">ページ数・締切を変更すると作画ブロックが再生成されます</div>':''}
     <div style="margin-top:8px"><button class="btn danger" style="width:100%" onclick="deleteWork('${w.id}')">この作品を削除</button></div>`,
    '保存', () => {
      const newType = document.getElementById('f-type').value;
      w.title = document.getElementById('f-title').value.trim();
      w.workType = newType;
      w.deadline = document.getElementById('f-deadline').value;
      w.color = document.getElementById('f-color').value;
      w.memo = document.getElementById('f-memo').value.trim();
      if (newType === 'comic') {
        w.pages = parseInt(document.getElementById('f-pages').value) || w.pages;
        autoBlocks(w);
      }
      save(); closeModal(); renderAll();
    });
}

function deleteWork(workId) {
  if (!confirm('この作品とすべてのブロックを削除しますか？')) return;
  S.works = S.works.filter(w => w.id !== workId);
  S.blocks = S.blocks.filter(b => b.workId !== workId);
  save(); closeModal();
  switchView(S.works.length ? 'works' : 'calendar');
}

function openAddTask(workId) {
  openModal('タスク・打ち合わせを追加',
    `<div class="form-row"><label>タスク名</label><input id="f-task" placeholder="例: 打ち合わせ、表紙入稿" autofocus /></div>
     <div class="form-row"><label>日付</label><input id="f-task-date" type="date" value="${dateStr(new Date())}" /></div>`,
    '追加', () => {
      const title = document.getElementById('f-task').value.trim();
      const date = document.getElementById('f-task-date').value;
      if (!title || !date) return;
      S.blocks.push({ id: uid(), workId, type: 'task', title, date, done: false });
      save(); closeModal(); renderAll();
    });
}

function openMoveBlock(blockId, e) {
  e?.stopPropagation();
  const b = S.blocks.find(b => b.id === blockId);
  if (!b) return;
  openModal('ブロックを移動',
    `<div class="form-row"><label>移動先の日付</label><input id="f-move-date" type="date" value="${b.date}" /></div>
     <div class="info-box">移動するとネーム締切日が自動で再計算されます</div>`,
    '移動', () => {
      const nd = document.getElementById('f-move-date').value;
      if (!nd) return;
      b.date = nd; recalcName(b.workId);
      save(); closeModal(); renderAll();
    });
}

// ===== TASK MODALS =====
function tagCheckboxesHTML(selectedIds) {
  if (!S.tags.length) return '<p style="font-size:12px;color:var(--text3)">タグがありません。タグ管理から追加してください。</p>';
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">` + S.tags.map(g => {
    const sel = selectedIds.includes(g.id);
    return `<label style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:12px;user-select:none;transition:all 0.15s;
      background:${sel ? g.color+'33' : 'var(--bg3)'};
      border:1.5px solid ${sel ? g.color : 'var(--border)'};
      color:${sel ? g.color : 'var(--text2)'}">
      <input type="checkbox" data-tag-id="${g.id}" ${sel?'checked':''}
        style="display:none"
        onchange="this.closest('label').style.background=this.checked?'${g.color}33':'var(--bg3)';this.closest('label').style.borderColor=this.checked?'${g.color}':'var(--border)';this.closest('label').style.color=this.checked?'${g.color}':'var(--text2)'">
      ${g.emoji ? `<span style="font-size:13px">${g.emoji}</span>` : `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${g.color};flex-shrink:0"></span>`}
      ${g.name}
    </label>`;
  }).join('') + '</div>';
}

function getSelectedTagIds() {
  return [...document.querySelectorAll('[data-tag-id]:checked')].map(el => el.dataset.tagId);
}

function openNewTask(presetDate) {
  openModal('タスクを追加', `
    <div class="form-row"><label>タイトル</label><input id="f-task-title" placeholder="タスク名" autofocus /></div>
    <div class="form-row"><label>日付</label><input id="f-task-date" type="date" value="${presetDate||''}" /></div>
    <div class="form-row"><label>時間</label><input id="f-task-time" type="time" /></div>
    <div class="form-row"><label>タグ</label><div id="f-tag-checks">${tagCheckboxesHTML([])}</div></div>
    <div class="form-row"><label>メモ</label><textarea id="f-task-memo" rows="3" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:13px;font-family:var(--font);resize:vertical;outline:none"></textarea></div>
  `, '追加', () => {
    const title = document.getElementById('f-task-title').value.trim();
    if (!title) return;
    S.tasks.push({
      id: uid(), title,
      date: document.getElementById('f-task-date').value || null,
      time: document.getElementById('f-task-time').value || null,
      tagIds: getSelectedTagIds(),
      memo: document.getElementById('f-task-memo').value.trim(),
      done: false
    });
    save(); closeModal(); renderAll();
  });
}

function openNewTaskOnDate(ds) {
  openNewTask(ds);
}

function subTasksHTML(t) {
  // 日付順ソート（日付なしは末尾）。インデックスではなくIDで操作する
  const subs = (t.subTasks||[]).slice().sort((a,b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });
  const chkSvg = `<svg width="9" height="9" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="white" stroke-width="2"/></svg>`;
  const rows = subs.map(s => `
    <div style="display:flex;align-items:flex-center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <div style="width:16px;height:16px;border:1.5px solid ${s.done?'var(--success)':'var(--border)'};border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:${s.done?'var(--success)':'transparent'};margin-top:1px"
        onclick="toggleSubTaskById('${t.id}','${s.id}')">${s.done?chkSvg:''}</div>
      <input type="text" value="${(s.title||'').replace(/"/g,'&quot;')}"
        onchange="updateSubTaskTitle('${t.id}','${s.id}',this.value)"
        style="flex:1;min-width:80px;padding:2px 6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;font-family:var(--font);outline:none;${s.done?'opacity:0.45;text-decoration:line-through':''}">
      <input type="date" value="${s.date||''}" onchange="updateSubTaskDate('${t.id}','${s.id}',this.value)"
        style="width:120px;padding:2px 6px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);border-radius:4px;font-size:10px;font-family:var(--font);outline:none;-webkit-appearance:none">
      <button onclick="deleteSubTaskById('${t.id}','${s.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1">×</button>
    </div>`).join('');
  return `<div id="subtask-list">${rows}</div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <input id="f-sub-title" placeholder="サブタスク名" style="flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:12px;font-family:var(--font);outline:none">
      <input id="f-sub-date" type="date" style="width:130px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:12px;font-family:var(--font);outline:none;-webkit-appearance:none">
      <button class="btn" style="padding:4px 10px;flex-shrink:0" onclick="addSubTask('${t.id}')">追加</button>
    </div>`;
}

function _findSubTask(taskId, subId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t || !t.subTasks) return null;
  return t.subTasks.find(s => s.id === subId) || null;
}

function toggleSubTaskById(taskId, subId) {
  const s = _findSubTask(taskId, subId);
  if (!s) return;
  s.done = !s.done;
  save(); renderAll();
  const wrap = document.getElementById('f-subtask-wrap');
  if (wrap) { const t = S.tasks.find(t => t.id === taskId); if (t) wrap.innerHTML = subTasksHTML(t); }
}

function updateSubTaskTitle(taskId, subId, value) {
  const s = _findSubTask(taskId, subId);
  if (!s) return;
  s.title = value.trim() || s.title;
  save(); renderAll();
}

function updateSubTaskDate(taskId, subId, value) {
  const s = _findSubTask(taskId, subId);
  if (!s) return;
  s.date = value || null;
  save(); renderAll();
  // 日付変わったらソート順が変わるので再描画
  const wrap = document.getElementById('f-subtask-wrap');
  if (wrap) { const t = S.tasks.find(t => t.id === taskId); if (t) wrap.innerHTML = subTasksHTML(t); }
}

function deleteSubTaskById(taskId, subId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t || !t.subTasks) return;
  t.subTasks = t.subTasks.filter(s => s.id !== subId);
  save(); renderAll();
  const wrap = document.getElementById('f-subtask-wrap');
  if (wrap) wrap.innerHTML = subTasksHTML(t);
}

function addSubTask(taskId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  const title = document.getElementById('f-sub-title')?.value.trim();
  if (!title) return;
  const date = document.getElementById('f-sub-date')?.value || null;
  if (!t.subTasks) t.subTasks = [];
  t.subTasks.push({ id: uid(), title, date, done: false });
  save(); renderAll();
  const wrap = document.getElementById('f-subtask-wrap');
  if (wrap) wrap.innerHTML = subTasksHTML(t);
}

function openEditTask(taskId, e) {
  e?.stopPropagation();
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  openModal('タスクを編集', `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <input type="checkbox" id="f-task-done" ${t.done?'checked':''} style="width:16px;height:16px;accent-color:var(--success);cursor:pointer">
      <label for="f-task-done" style="font-size:13px;cursor:pointer;color:var(--text2)">完了</label>
    </div>
    <div class="form-row"><label>タイトル</label><input id="f-task-title" value="${t.title||''}" /></div>
    <div class="form-row"><label>日付</label><input id="f-task-date" type="date" value="${t.date||''}" /></div>
    <div class="form-row"><label>時間</label><input id="f-task-time" type="time" value="${t.time||''}" /></div>
    <div class="form-row"><label>タグ</label><div id="f-tag-checks">${tagCheckboxesHTML(t.tagIds||[])}</div></div>
    <div class="form-row"><label>メモ</label><textarea id="f-task-memo" rows="5" style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:13px;font-family:var(--font);resize:vertical;outline:none;min-height:100px">${t.memo||''}</textarea></div>
    <div class="form-row"><label>サブタスク</label><div id="f-subtask-wrap">${subTasksHTML(t)}</div></div>
    <div style="margin-top:8px"><button class="btn danger" style="width:100%" onclick="deleteTask('${t.id}')">このタスクを削除</button></div>
  `, '保存', () => {
    t.done  = document.getElementById('f-task-done').checked;
    t.title = document.getElementById('f-task-title').value.trim();
    t.date  = document.getElementById('f-task-date').value || null;
    t.time  = document.getElementById('f-task-time').value || null;
    t.tagIds = getSelectedTagIds();
    t.memo  = document.getElementById('f-task-memo').value.trim();
    save(); closeModal(); renderAll();
  });
}

function deleteTask(taskId) {
  if (!confirm('このタスクを削除しますか？')) return;
  S.tasks = S.tasks.filter(t => t.id !== taskId);
  save(); closeModal(); renderAll();
}

function openTagManager() {
  const renderTagList = () => {
    const rows = S.tags.map((g, idx) => `
      <div class="tag-manager-row">
        <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0">
          <button onclick="moveTag('${g.id}',-1)" style="background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;border-radius:3px;padding:0 4px;font-size:10px;line-height:1.4" ${idx===0?'disabled':''}>▲</button>
          <button onclick="moveTag('${g.id}',1)" style="background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;border-radius:3px;padding:0 4px;font-size:10px;line-height:1.4" ${idx===S.tags.length-1?'disabled':''}>▼</button>
        </div>
        <input type="color" value="${g.color}" onchange="updateTagColor('${g.id}',this.value)"
          style="width:28px;height:28px;padding:2px;border:none;background:none;cursor:pointer;flex-shrink:0">
        <input type="text" value="${g.emoji||''}" onchange="updateTagEmoji('${g.id}',this.value)"
          placeholder="😀" style="width:38px;padding:4px 6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:16px;text-align:center;font-family:var(--font);outline:none;flex-shrink:0">
        <input type="text" value="${g.name}" onchange="updateTagName('${g.id}',this.value)"
          style="flex:1;padding:4px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:13px;font-family:var(--font);outline:none">
        <button class="btn danger" style="padding:2px 8px;font-size:11px" onclick="deleteTag('${g.id}')">削除</button>
      </div>`).join('');
    const addRow = `<div style="display:flex;gap:6px;margin-top:10px">
      <input id="f-new-tag-emoji" placeholder="😀" style="width:40px;padding:7px 6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:16px;text-align:center;font-family:var(--font);outline:none;flex-shrink:0">
      <input id="f-new-tag" placeholder="新しいタグ名" style="flex:1;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);font-size:13px;font-family:var(--font);outline:none">
      <input id="f-new-tag-color" type="color" value="#7a9abf" style="width:36px;padding:2px;border:none;background:var(--bg3);border-radius:var(--radius);cursor:pointer">
      <button class="btn primary" onclick="addTag()" style="flex-shrink:0">追加</button>
    </div>`;
    document.getElementById('modal-body').innerHTML = `<div>${rows}</div>${addRow}`;
  };

  openModal('タグ管理', '', '閉じる', () => closeModal());
  document.getElementById('modal-ok').onclick = closeModal;
  renderTagList();
  window._reRenderTagList = renderTagList;
}

function addTag() {
  const name = document.getElementById('f-new-tag')?.value.trim();
  const color = document.getElementById('f-new-tag-color')?.value || '#7a9abf';
  const emoji = document.getElementById('f-new-tag-emoji')?.value.trim() || '';
  if (!name) return;
  S.tags.push({ id: uid(), name, color, emoji });
  save();
  if (window._reRenderTagList) window._reRenderTagList();
}

function updateTagEmoji(tagId, emoji) {
  const g = S.tags.find(g => g.id === tagId);
  if (g) { g.emoji = emoji.trim(); save(); renderAll(); }
}

function updateTagColor(tagId, color) {
  const g = S.tags.find(g => g.id === tagId);
  if (g) { g.color = color; save(); renderAll(); }
}

function moveTag(tagId, dir) {
  const idx = S.tags.findIndex(g => g.id === tagId);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= S.tags.length) return;
  const tmp = S.tags[idx];
  S.tags[idx] = S.tags[newIdx];
  S.tags[newIdx] = tmp;
  save(); renderAll();
  if (window._reRenderTagList) window._reRenderTagList();
}

function updateTagName(tagId, name) {
  const g = S.tags.find(g => g.id === tagId);
  if (g && name.trim()) { g.name = name.trim(); save(); renderAll(); }
}

function deleteTag(tagId) {
  S.tags = S.tags.filter(g => g.id !== tagId);
  S.tasks.forEach(t => { t.tagIds = (t.tagIds||[]).filter(id => id !== tagId); });
  save();
  if (window._reRenderTagList) window._reRenderTagList();
}

// ===== DATA IO =====
function exportData() {
  const json = JSON.stringify({ works: S.works, blocks: S.blocks, tasks: S.tasks, tags: S.tags, exportedAt: new Date().toISOString() }, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = `blocks_backup_${dateStr(new Date())}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.works || !d.blocks) throw new Error('invalid');
      if (!confirm(`${d.works.length}件の作品、${(d.tasks||[]).length}件のタスクをインポートします。現在のデータは上書きされます。`)) return;
      S.works = d.works; S.blocks = d.blocks;
      S.tasks = d.tasks || []; S.tags = d.tags || [];
      save(); renderAll();
      alert('インポートが完了しました');
    } catch { alert('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmClear() {
  if (!confirm('全データを削除します。この操作は取り消せません。')) return;
  S.works = []; S.blocks = []; S.tasks = []; S.tags = [];
  save(); switchView('calendar');
}

// ===== MOBILE MENU =====
function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('mobile-overlay').classList.toggle('open');
}
function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobile-overlay').classList.remove('open');
}

// ===== SW REGISTRATION =====
function _showUpdateBanner(worker) {
  if (document.getElementById('update-banner')) return; // 二重表示防止
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#c8b89a;color:#0f0f0f;padding:11px 22px;border-radius:20px;font-size:13px;z-index:9999;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.5);white-space:nowrap';
  banner.textContent = '🔄 新しいバージョンがあります。タップして更新';
  banner.onclick = () => {
    worker.postMessage({ type: 'SKIP_WAITING' });
    // controllerchangeを待って確実にリロード
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!reloading) { reloading = true; location.reload(); }
    });
    // 3秒待ってもcontrollerchangeが来ない場合は強制リロード
    setTimeout(() => { if (!reloading) { reloading = true; location.reload(); } }, 3000);
  };
  document.body.appendChild(banner);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // パターン1: 登録直後にすでにwaiting中のSWがある（ページ再読み込みケース）
      if (reg.waiting) { _showUpdateBanner(reg.waiting); }

      // パターン2: インストール中のSWが完了してwaitingになった
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) {
            _showUpdateBanner(w);
          }
        });
      });

      // 定期チェック: 1時間ごとに新バージョンを確認
      setInterval(() => reg.update(), 60 * 60 * 1000);
    }).catch(() => {});
  });
}

// ===== INIT =====
load();
renderAll();

// リサイズ時にカレンダー表示を切り替え
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { if (S.view === 'calendar') renderCalendar(); }, 150);
});
</script>
